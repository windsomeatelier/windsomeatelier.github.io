<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WindsomeAtelier Shop</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; }
    header { background:#222; color:#fff; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
    header h1 { margin:0; }
    nav a { color:#fff; margin-left:20px; text-decoration:none; }

    .hero { height:80vh; background:url('wa.jpg') center/cover no-repeat; display:flex; justify-content:center; align-items:center; color:#fff; text-align:center; }
    .hero h2 { font-size:48px; }

    .section { padding:60px 20px; text-align:center; }
    .products { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:20px; }
    .card { border:1px solid #ddd; padding:15px; border-radius:10px; }
    .card img { width:100%; border-radius:10px; }

    .btn { display:inline-block; margin-top:10px; padding:10px 20px; background:#222; color:#fff; text-decoration:none; border-radius:5px; }

    footer { background:#222; color:#fff; text-align:center; padding:20px; }
  </style>
</head>
<body>

<header>
  <h1>WindsomeAtelier Shop</h1>
  <nav>
    <a href="#knit">뜨개</a>
    <a href="#embroidery">자수</a>
    <a href="#leather">가죽</a>
  </nav>
</header>

<section class="wa">
  <div>
    <h2>핸드메이드 감성</h2>
    <p>뜨개, 자수, 가죽 제품을 한 곳에서</p>
  </div>
</section>

<section id="knit" class="section">
  <h2>뜨개</h2>
  <div class="products">
    <div class="card">
      <img src="knit1.jpg" alt="">
      <h3>모자</h3>
      <p>₩</p>
      <a href="#" class="btn">구매하기</a>
    </div>
    <div class="card">
      <img src="knit2.jpg" alt="">
      <h3>가방</h3>
      <p>₩</p>
      <a href="#" class="btn">구매하기</a>
    </div>
  </div>
</section>

<section id="embroidery" class="section">
  <h2>자수</h2>
  <div class="products">
    <div class="card">
      <img src="emb1.jpg" alt="">
      <h3>파우치</h3>
      <p>₩</p>
      <a href="#" class="btn">구매하기</a>
    </div>
    <div class="card">
      <img src="emb2.jpg" alt="">
      <h3>액자</h3>
      <p>₩</p>
      <a href="#" class="btn">구매하기</a>
    </div>
  </div>
</section>

<section id="leather" class="section">
  <h2>가죽</h2>
  <div class="products">
    <div class="card">
      <img src="leather1.jpg" alt="">
      <h3>지갑</h3>
      <p>₩0</p>
      <a href="#" class="btn">구매하기</a>
    </div>
    <div class="card">
      <img src="leather2.jpg" alt="">
      <h3>키링</h3>
      <p>₩0</p>
      <a href="#" class="btn">구매하기</a>
    </div>
  </div>
</section>

<footer>
  <p>© 2026 Handmade Shop</p>
</footer>

</body>
</html>
